<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>愚人节小游戏合集</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #333;
            font-size: 2.5rem; /* 更大的标题 */
            margin-bottom: 30px;
            text-align: center;
        }
        .game-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 600px;
            width: 100%;
            align-items: center;
        }
        .game-links a {
            text-decoration: none;
            color: #007BFF;
            font-size: 1.8rem; /* 更大的链接文字 */
            padding: 14px 24px;
            border: 2px solid #007BFF;
            border-radius: 10px;
            background-color: #fff;
            transition: all 0.2s ease;
            width: fit-content;
            text-align: center;
        }
        .game-links a:hover {
            background-color: #e6f2ff;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
<h1>愚人节小游戏合集</h1>
<div class="game-links" id="linksContainer"></div>

<script>
        const startYear = 2026;
        const endYear = 2027;

        const container = document.getElementById('linksContainer');
        // 获取当前页面的基础 URL（不含文件名）
        const pathParts = window.location.pathname.split('/').slice(0, -1);
        const basePath = window.location.origin + pathParts.join('/') + '/';

        for (let year = startYear; year <= endYear; year++) {
            const link = document.createElement('a');
            link.href = basePath + year;
            link.target = '_blank';
            link.textContent = `愚人节小游戏 ${year}`;
            container.appendChild(link);
        }
    </script>
</body>
</html>
